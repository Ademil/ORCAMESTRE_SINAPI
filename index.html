  .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:-.5px;text-transform:uppercase;}
  .logo-sub{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
  .header-total{text-align:right;}
  .header-total-label{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
  .header-total-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);transition:all .2s;}
  .nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;position:sticky;top:62px;z-index:99;}

  .main{max-width:900px;margin:0 auto;padding:20px 14px;}
  .chapter{margin-bottom:26px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .chapter-header{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);}

  .chapter-badge{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border);}
  .chapter-subtotal{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text2);}
  .chapter-total-wrap{display:flex;align-items:center;gap:7px;}
  .subchapter{border-bottom:1px solid var(--border);}
  .subchapter:last-child{border-bottom:none;}
  .subchapter-title{padding:9px 18px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--border);}
  .item-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--bg);transition:background .15s;}
  .item-row:hover{background:var(--surface);}
  .item-row:last-child{border-bottom:none;}
  .item-codigo{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--text3);margin-bottom:2px;}
  .item-desc{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:2px;}
  .item-price{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--blue);}

  .qty-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
  .qty-label{font-size:8px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}

  .subtotal-value.active{color:var(--accent);}

  .add-item-btn:hover{background:var(--surface2);border-color:var(--blue);color:var(--blue);}

  @keyframes flash{0%{background:rgba(56,139,253,.2);}100%{background:transparent;}}

  .bdi-result{

  .bdi-result.show{display:flex;}
  .bdi-result-label{font-size:8px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
  .bdi-result-value{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green);}

  /* header mostra os dois totais */
  .header-total-sub{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text3);display:none;margin-top:1px;}
  .header-total-sub.show{display:block;}
  @media(max-width:600px){.item-row{grid-template-columns:1fr;}.item-controls{justify-content:space-between;}.header-total{display:none;}}
</style>
<script src="banco.js"></script>

function getItem(cod){
  if(CUB[cod])return CUB[cod];
  // Busca no array interno (campos curtos c/d/u/p)
  const local=SINAPI.find(i=>i.c===cod);
  if(local)return local;
  // Busca no banco.js (campos: codigo, descricao, unidade, preco) – normaliza para c/d/u/p
  if(typeof bibliotecaGlobal!=='undefined'){
    const ext=bibliotecaGlobal.find(i=>i.codigo===cod);
    if(ext)return{c:ext.codigo,d:ext.descricao,u:ext.unidade,p:ext.preco};
  }
  return null;
}

/* ======== RENDER ======== */
function saveState(){
  try{
    localStorage.setItem('orcamento_v2',    JSON.stringify(orcamento));
    localStorage.setItem('chaptersData_v2', JSON.stringify(chaptersData));
    const bdi=document.getElementById('bdi-input');
    if(bdi) localStorage.setItem('bdi_v2', bdi.value||'0');
  }catch(e){ console.warn('saveState erro:',e); }
}

function loadState(){
  try{
    const orcSaved = localStorage.getItem('orcamento_v2');
    const capSaved = localStorage.getItem('chaptersData_v2');
    const bdiSaved = localStorage.getItem('bdi_v2');
    if(orcSaved){
      const parsed=JSON.parse(orcSaved);
      Object.entries(parsed).forEach(([k,v])=>{ if(v&&v.qtd>0) orcamento[k]=v; });
    }
    if(capSaved){
      const parsedCaps=JSON.parse(capSaved);
      parsedCaps.forEach(savedCap=>{
        const cap=chaptersData.find(c=>c.id===savedCap.id);
        if(!cap) return;
        savedCap.subs.forEach((savedSub,si)=>{
          if(cap.subs[si]) cap.subs[si].itens=savedSub.itens;
        });
      });
    }
    if(bdiSaved) window._bdiPendente=bdiSaved;
  }catch(e){ console.warn('loadState erro:',e); }
}

function init(){
  loadState();
  renderNav();
  renderChapters();
  if(window._bdiPendente){
    const bdiEl=document.getElementById('bdi-input');
    if(bdiEl){ bdiEl.value=window._bdiPendente; updateBDI(window._bdiPendente); }
    delete window._bdiPendente;
  }
  updateSummary();

function renderItemHTML(item,capId,subIdx){
  const cod=item.c,desc=item.d,unit=item.u;

  const price = entry ? entry.preco : item.p;
  const priceOrig = item.p;
  const qty=entry?entry.qtd:'', sub=entry?entry.subtotal:0;
  const isCUB=cod.startsWith('CUB-');
  const edited = (price !== priceOrig) ? ' price-edited' : '';
  const deleteBtn=(!isCUB&&capId!=null)
    ?`<button class="btn-delete" title="Remover item" onclick="removerItem('${capId}',${subIdx},'${cod}')">✕</button>`
    :'';
  return `<div class="item-row" id="row-${domId}">
    <div class="item-info">
      <div class="item-codigo">${cod} · ${isCUB?'CUB SINDUSCON-SC 03/2026':'SINAPI/SC 03/2026 – DESONERADO'}</div>

        <input type="number" class="price-input${edited}" id="price-${domId}"

          min="0" step="0.01" value="${price}"
          oninput="updatePrice('${key}',this.value,'${cod}','${domId}')">
        <span class="price-unit">/ ${unit}</span>
        ${price!==priceOrig?`<span title="Preço original SINAPI: ${fmt(priceOrig)}" style="font-size:9px;color:var(--text3);cursor:help">↺</span>`:''}
      </div>
    </div>
    <div class="item-controls">
      <div class="qty-wrap">
        <span class="qty-label">Qtd. (${unit})</span>
        <input type="number" class="qty-input" min="0" step="0.01" placeholder="0.00"
          value="${qty}" oninput="updateItem('${key}',this.value,${price},'${cod}')" id="qty-${domId}">
      </div>
      <div class="subtotal-wrap">
        <span class="subtotal-label">Subtotal</span>
        <span class="subtotal-value${sub>0?' active':''}" id="sub-${domId}">${sub>0?fmt(sub):'R$ 0,00'}</span>

function calcCapTotal(cap){
  let t=0;
  cap.subs.forEach((sub,si)=>{
    sub.itens.forEach(cod=>{
      const key=cap.id+'::'+si+'::'+cod;
      if(orcamento[key]) t+=orcamento[key].subtotal;
    });
  });
  return t;
}

/* ======== UPDATES ======== */
function updateItem(key,value,precoBase,cod){
  const qty=parseFloat(value)||0;
  // Se o item já tem preço personalizado, usa ele; caso contrário, usa precoBase
  const precoAtual = (orcamento[key] && orcamento[key].preco!==undefined) ? orcamento[key].preco : precoBase;
  const sub=qty*precoAtual;
  const item=getItem(cod);
  if(qty>0){
    orcamento[key]={
      qtd:qty, preco:precoAtual, subtotal:sub,
      descricao:item?item.d:'Item', unidade:item?item.u:'un', cod
    };
  } else {
    // Mantém o preço personalizado mesmo zerado, para não perder a edição
    if(orcamento[key]) orcamento[key].qtd=0, orcamento[key].subtotal=0;
    else delete orcamento[key];
    if(orcamento[key] && orcamento[key].qtd===0) delete orcamento[key];
  }
  const domId=key.replace(/::/g,'-');
  const el=document.getElementById('sub-'+domId);
  if(el){el.textContent=qty>0?fmt(sub):'R$ 0,00';el.className='subtotal-value'+(qty>0?' active':'');}
  updateCapTotals();updateSummary();saveState();
}

function updatePrice(key, novoPreco, cod, domId){
  const preco = parseFloat(novoPreco);
  if(isNaN(preco) || preco < 0) return;
  // Atualiza ou cria a entrada com o novo preço
  if(!orcamento[key]){
    // Item ainda sem quantidade — apenas guarda o preço para quando digitar qtd
    orcamento[key] = { qtd:0, preco, subtotal:0,
      descricao: getItem(cod)?getItem(cod).d:'Item',
      unidade:   getItem(cod)?getItem(cod).u:'un', cod };
  } else {
    orcamento[key].preco    = preco;
    orcamento[key].subtotal = orcamento[key].qtd * preco;
  }
  // Atualiza subtotal visível
  const subEl = document.getElementById('sub-'+domId);
  if(subEl){
    const sub = orcamento[key].subtotal;
    subEl.textContent = sub>0 ? fmt(sub) : 'R$ 0,00';
    subEl.className   = 'subtotal-value' + (sub>0?' active':'');
  }
  // Atualiza o input de quantidade para recalcular com novo preço
  const qtyEl = document.getElementById('qty-'+domId);
  if(qtyEl && qtyEl.value) {
    updateItem(key, qtyEl.value, preco, cod);
    return; // updateItem já chama updateCapTotals+updateSummary
  }
  // Destaca o preço como editado
  const priceEl = document.getElementById('price-'+domId);
  const origItem = getItem(cod);
  if(priceEl && origItem){
    if(Math.abs(preco - origItem.p) > 0.001){
      priceEl.classList.add('price-edited');
    } else {
      priceEl.classList.remove('price-edited');
    }
  }
  updateCapTotals(); updateSummary(); saveState();
}


function updateCapTotals(){
  chaptersData.forEach(cap=>{
    const t=calcCapTotal(cap),el=document.getElementById(`ch-total-${cap.id}`);
    if(el)el.textContent=t>0?fmt(t):'—';
  });
}

function updateSummary(){
  const entries=Object.values(orcamento);
  const total=entries.reduce((s,e)=>s+e.subtotal,0);
  const count=entries.length;
  document.getElementById('total-geral').textContent=fmt(total);
  document.getElementById('bar-count').innerHTML=count>0
    ?`<strong>${count}</strong> ${count===1?'item quantificado':'itens quantificados'}`
    :'Nenhum item quantificado';
  // Atualiza BDI com o novo total
  const bdiPct=parseFloat(document.getElementById('bdi-input')?.value)||0;
  aplicarBDI(total, bdiPct);
}

function updateBDI(val){
  const entries=Object.values(orcamento);
  const total=entries.reduce((s,e)=>s+e.subtotal,0);
  aplicarBDI(total, parseFloat(val)||0);
  saveState();
}

function aplicarBDI(total, pct){
  const totalBdi = total * (1 + pct/100);
  const bdiResult = document.getElementById('bdi-result');
  const bdiVal    = document.getElementById('bdi-total-value');
  const hdrSub    = document.getElementById('total-bdi-header');
  if(pct>0){
    if(bdiResult) { bdiResult.classList.add('show'); }
    if(bdiVal)    { bdiVal.textContent=fmt(totalBdi); }
    if(hdrSub)    { hdrSub.textContent='c/ BDI: '+fmt(totalBdi); hdrSub.classList.add('show'); }
  } else {
    if(bdiResult) { bdiResult.classList.remove('show'); }
    if(hdrSub)    { hdrSub.classList.remove('show'); }
  }
}

  setTimeout(()=>document.getElementById('input-busca').focus(),80);
}
function fecharBusca(){
  document.getElementById('modal-busca').classList.remove('open');
  destinoBusca=null;
}
function filtrarBusca(){
  const termo=document.getElementById('input-busca').value.toLowerCase().trim();
  const lista=document.getElementById('lista-busca');
  lista.innerHTML='';

  // Usa bibliotecaGlobal do banco.js (campos: codigo, descricao, unidade, preco)
  const fonte=(typeof bibliotecaGlobal!=='undefined')?bibliotecaGlobal:[];
  const footer=document.getElementById('modal-footer-count');
  if(footer)footer.textContent=`SINAPI/SC – Desonerado – 03/2026 · ${fonte.length.toLocaleString('pt-BR')} insumos`;

  if(!termo){
    lista.innerHTML='<div class="empty-state">🔍 Digite código ou descrição para pesquisar.</div>';
    return;
  }
  const res=fonte.filter(i=>i.codigo.includes(termo)||i.descricao.toLowerCase().includes(termo));
  if(!res.length){lista.innerHTML='<div class="empty-state">🔍 Nenhum resultado encontrado.</div>';return;}
  const total=res.length;
  res.slice(0,60).forEach(item=>{
    const div=document.createElement('div');
    div.className='search-item';
    const codSafe=item.codigo.replace(/'/g,"\\'");
    div.innerHTML=`<div style="flex:1;min-width:0;">
      <div class="search-item-code">${item.codigo} · SINAPI/SC 03/2026</div>
      <div class="search-item-desc">${item.descricao}</div>
      <div class="search-item-price">${fmt(item.preco)} / ${item.unidade}</div>
    </div>
    <button class="btn-add-item" onclick="adicionarItem('${codSafe}')">Adicionar</button>`;
    lista.appendChild(div);
  });
  if(total>60){
    const aviso=document.createElement('div');
    aviso.className='empty-state';aviso.style.paddingTop='8px';
    aviso.textContent=`Exibindo 60 de ${total} resultados. Refine a pesquisa.`;
    lista.appendChild(aviso);
  }
}
function adicionarItem(cod){
  if(!destinoBusca)return;
  const {capId,subIdx}=destinoBusca;
  const cap=chaptersData.find(c=>c.id===capId);
  if(!cap)return;
  const sub=cap.subs[subIdx];
  if(!sub)return;
  if(sub.itens.includes(cod)){showToast('Item já adicionado.');return;}
  sub.itens.push(cod);
  fecharBusca();renderChapters();updateCapTotals();saveState();
  setTimeout(()=>{
    const domId=capId+'-'+subIdx+'-'+cod;
    const el=document.getElementById('row-'+domId);
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1500);}
  },120);
  showToast('Item adicionado!',true);
}

function removerItem(capId,subIdx,cod){
  const cap=chaptersData.find(c=>c.id===capId);
  if(!cap)return;
  const sub=cap.subs[subIdx];
  if(!sub)return;

  // Animação de saída
  const key=capId+'::'+subIdx+'::'+cod;
  const domId=capId+'-'+subIdx+'-'+cod;
  const row=document.getElementById('row-'+domId);
  const doRemove=()=>{
    sub.itens=sub.itens.filter(c=>c!==cod);
    delete orcamento[key];
    updateCapTotals();
    updateSummary();
    saveState();
  };
  if(row){
    row.style.transition='all .2s ease';
    row.style.opacity='0';
    row.style.transform='scaleY(0)';
    row.style.transformOrigin='top';
    row.style.maxHeight=row.offsetHeight+'px';
    row.style.overflow='hidden';
    setTimeout(()=>{ doRemove(); row.remove(); },200);
  } else { doRemove(); }
}

function fmt(v){return`R$ ${v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;}
function scrollToSection(id){const el=document.getElementById(id);if(!el)return;window.scrollTo({top:el.getBoundingClientRect().top+window.pageYOffset-124,behavior:'smooth'});}
function limparTudo(){
  if(!confirm('Limpar todos os dados do orçamento?\nIsso apagará permanentemente todos os itens e quantidades.'))return;
  orcamento={};
  chaptersData.forEach(cap=>{
    if(cap.isCUB) return;
    cap.subs.forEach(sub=>{ sub.itens=[]; });
  });
  localStorage.removeItem('orcamento_v2');
  localStorage.removeItem('chaptersData_v2');
  localStorage.removeItem('bdi_v2');
  const bdiEl=document.getElementById('bdi-input');
  if(bdiEl){ bdiEl.value=''; updateBDI(0); }
  renderChapters();
  updateSummary();
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('Orçamento limpo com sucesso.',true);
}

/* ======== EXPORT EXCEL (geração nativa — sem CDN) ======== */
function exportarExcel(){
  try{

    // ── 1. Coleta linhas na ordem dos capítulos/subcapítulos ─────────────
    // Usa a chave composta  capId::subIdx::cod  —  isolamento total
    const linhas = [];
    chaptersData.forEach(cap => {
      cap.subs.forEach((sub, si) => {
        sub.itens.forEach(cod => {
          const key = cap.id + '::' + si + '::' + cod;
          const e   = orcamento[key];
          if (!e) return; // item sem quantidade — ignora
          const item = getItem(cod);
          linhas.push({
            cap:  cap.titulo,
            sub:  sub.nome,
            cod,
            desc: item ? item.d : e.descricao,
            und:  e.unidade,
            qtd:  e.qtd,
            pu:   e.preco,
            sub_: e.subtotal,   // subtotal desta linha
          });
        });
      });
    });

    if (!linhas.length) {
      showToast('Nenhum item quantificado para exportar.');
      return;
    }

    const dataHoje   = new Date().toLocaleDateString('pt-BR');

      + '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
      + '<cellXfs>'
      + '<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>'  // s=0 normal
      + '<xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0"/>'  // s=1 negrito texto
      + '<xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0"/>'  // s=2 negrito número
      + '</cellXfs>'
      + '</styleSheet>';

    // ── 7. Arquivos estruturais do XLSX (Office Open XML) ─────────────────
    const contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'

      + '<Default Extension="xml"  ContentType="application/xml"/>'
      + '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
      + '<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'
      + '<Override PartName="/xl/worksheets/sheet2.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'
      + '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'

    const relsRoot = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'

      + '</Relationships>';

    const workbook = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
      + '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'

      + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>'
      + '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet2.xml"/>'
      + '<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles"    Target="styles.xml"/>'
      + '</Relationships>';

    // ── 8. Gerador de ZIP (sem dependências) ──────────────────────────────
    const enc = new TextEncoder();

    function crc32(buf) {
      let c = 0xFFFFFFFF;
      for (let b of buf) { c ^= b; for (let j = 0; j < 8; j++) c = c & 1 ? (c >>> 1) ^ 0xEDB88320 : c >>> 1; }
      return (c ^ 0xFFFFFFFF) >>> 0;
    }

    function makeEntry(name, content) {
      const nameB = enc.encode(name);
      const dataB = enc.encode(content);
      const crc   = crc32(dataB);
      const size  = dataB.length;
      const local = new Uint8Array(30 + nameB.length);
      const dv    = new DataView(local.buffer);
      dv.setUint32( 0, 0x04034b50, true);  // local file header sig
      dv.setUint16( 4, 20, true);           // version needed
      dv.setUint16( 6, 0,  true);           // flags
      dv.setUint16( 8, 0,  true);           // compression: STORED
      dv.setUint16(10, 0,  true);           // mod time
      dv.setUint16(12, 0,  true);           // mod date
      dv.setUint32(14, crc,  true);
      dv.setUint32(18, size, true);
      dv.setUint32(22, size, true);
      dv.setUint16(26, nameB.length, true);
      dv.setUint16(28, 0, true);
      local.set(nameB, 30);
      return { local, data: dataB, name: nameB, crc, size };
    }

    function buildZip(entries) {
      const parts = [];
      const cdirs = [];
      let offset  = 0;
      entries.forEach(e => {
        cdirs.push({ ...e, offset });
        parts.push(e.local, e.data);
        offset += e.local.length + e.data.length;
      });
      const cdStart = offset;
      cdirs.forEach(({ name, crc, size, offset: loff }) => {
        const cd = new Uint8Array(46 + name.length);
        const dv = new DataView(cd.buffer);
        dv.setUint32( 0, 0x02014b50, true);
        dv.setUint16( 4, 20, true); dv.setUint16( 6, 20, true);
        dv.setUint16( 8, 0,  true); dv.setUint16(10, 0,  true);
        dv.setUint16(12, 0,  true); dv.setUint16(14, 0,  true);
        dv.setUint32(16, crc,  true);
        dv.setUint32(20, size, true);
        dv.setUint32(24, size, true);
        dv.setUint16(28, name.length, true);
        dv.setUint16(30, 0, true); dv.setUint16(32, 0, true);
        dv.setUint16(34, 0, true); dv.setUint16(36, 0, true);
        dv.setUint32(38, 0,    true);
        dv.setUint32(42, loff, true);
        cd.set(name, 46);
        parts.push(cd);
        offset += cd.length;
      });
      const eocd = new Uint8Array(22);
      const ev   = new DataView(eocd.buffer);
      ev.setUint32( 0, 0x06054b50, true);
      ev.setUint16( 4, 0, true); ev.setUint16( 6, 0, true);
      ev.setUint16( 8, cdirs.length, true);
      ev.setUint16(10, cdirs.length, true);
      ev.setUint32(12, offset - cdStart, true);
      ev.setUint32(16, cdStart, true);
      ev.setUint16(20, 0, true);
      parts.push(eocd);
      const total = parts.reduce((s, p) => s + p.length, 0);
      const out   = new Uint8Array(total);
      let   pos   = 0;
      parts.forEach(p => { out.set(p, pos); pos += p.length; });
      return out;
    }

    // ── 9. Monta e baixa ──────────────────────────────────────────────────
    const zipBytes = buildZip([
      makeEntry('[Content_Types].xml',        contentTypes),
      makeEntry('_rels/.rels',                relsRoot),
      makeEntry('xl/workbook.xml',            workbook),
      makeEntry('xl/_rels/workbook.xml.rels', relsWb),
      makeEntry('xl/styles.xml',              stylesXml),
      makeEntry('xl/worksheets/sheet1.xml',   wsXml),
      makeEntry('xl/worksheets/sheet2.xml',   wsResXml),
    ]);

    const blob = new Blob([zipBytes], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Orcamento_' + dataHoje.replace(/\//g, '-') + '.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 15000);

    showToast('Excel exportado! (' + linhas.length + ' itens)', true);

  } catch(err) {
    console.error('exportarExcel erro:', err);
    showToast('Erro: ' + err.message);
  }
}


document.addEventListener('keydown',e=>{if(e.key==='Escape')fecharBusca();});
document.getElementById('modal-busca').addEventListener('click',e=>{if(e.target===document.getElementById('modal-busca'))fecharBusca();});
window.onload=init;
</script>
